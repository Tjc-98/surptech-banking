# Application
spring.application.name=surptech-banking
server.port=8080

# PostgreSQL database
# Set these environment variables before running, or update the values directly for local development.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/surptechdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
