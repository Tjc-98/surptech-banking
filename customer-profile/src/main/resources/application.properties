application.title=@project.name@
application.version=@project.version@

# Server Configuration
server.port=5551
server.servlet.context-path=/customer-profile
spring.application.name=customer-profile

# Database Configuration
database.type=sqlite
spring.datasource.url=jdbc:sqlite:customer-profile.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=file:db/sqlite/customer_personal_information.sql

# Actuator Configuration
management.endpoints.web.base-path=/management
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

