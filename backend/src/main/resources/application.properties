# Application
spring.application.name=surptech-banking
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:surptechdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Let Hibernate create the schema first, then run data.sql
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# H2 console (useful for development - open at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
