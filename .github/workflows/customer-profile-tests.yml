name: Run Customer Profile Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - integration
          - error-handling
          - health
          - all

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      
      - name: Build surptech-common
        run: |
          cd surptech-common
          mvn clean install -DskipTests
      
      - name: Build surptech-common-tester
        run: |
          cd surptech-common-tester
          mvn clean install -DskipTests
      
      - name: Build Customer Profile Service
        run: |
          cd customer-profile
          mvn clean package -DskipTests
      
      - name: Start Customer Profile Service
        run: |
          cd customer-profile
          nohup java -jar target/customer-profile-*.jar > customer-profile.log 2>&1 &
          echo $! > customer-profile.pid
          
          # Wait for service to be ready
          echo "Waiting for Customer Profile service to start..."
          for i in {1..30}; do
            if curl -s http://localhost:5551/customer-profile/management/health > /dev/null; then
              echo "Customer Profile service is ready!"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          
          # Verify service is running
          curl -f http://localhost:5551/customer-profile/management/health || exit 1
      
      - name: Run Tests
        run: |
          cd customer-profile-tester
          mvn clean test -Dtest.suite=${{ github.event.inputs.test_suite }}
      
      - name: Generate Allure Report
        if: always()
        run: |
          cd customer-profile-tester
          mvn allure:report
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.event.inputs.test_suite }}
          path: |
            customer-profile-tester/target/surefire-reports/
            customer-profile-tester/target/allure-results/
            customer-profile-tester/target/allure-report/
          retention-days: 30
      
      - name: Upload Service Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            customer-profile/customer-profile.log
          retention-days: 7
      
      - name: Stop Services
        if: always()
        run: |
          if [ -f customer-profile/customer-profile.pid ]; then
            kill $(cat customer-profile/customer-profile.pid) || true
          fi
      
      - name: Test Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Suite:** ${{ github.event.inputs.test_suite }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d customer-profile-tester/target/surefire-reports ]; then
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Test reports have been generated and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the artifacts to view detailed test results and Allure reports." >> $GITHUB_STEP_SUMMARY
          fi
