name: Run Integration Tests

run-name: Testing ${{ github.event.inputs.suite }} suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - all
          - smoke
          - integration
          - error-handling
          - health
          - ci

jobs:
  test:
    name: ${{ github.event.inputs.suite }} Suite
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Determine test suite
        id: suite
        run: |
          SUITE="${{ github.event.inputs.suite }}"
          echo "suite=$SUITE" >> $GITHUB_OUTPUT
          echo "=========================================="
          echo "Running Test Suite: $SUITE"
          echo "=========================================="

      - name: Build common library
        working-directory: ./surptech-common
        run: mvn clean install -DskipTests -B
        
      - name: Start Customer Profile Service
        working-directory: ./customer-profile
        run: |
          mvn clean package -DskipTests -B
          nohup java -jar target/customer-profile-*.jar > ../customer-profile.log 2>&1 &
          echo $! > ../customer-profile.pid

      - name: Start Credit Profile Service
        working-directory: ./credit-profile
        run: |
          mvn clean package -DskipTests -B
          nohup java -jar target/credit-profile-*.jar > ../credit-profile.log 2>&1 &
          echo $! > ../credit-profile.pid

      - name: Start Data Aggregator Service
        working-directory: ./data-aggregator
        run: |
          mvn clean package -DskipTests -B
          nohup java -jar target/data-aggregator-*.jar > ../data-aggregator.log 2>&1 &
          echo $! > ../data-aggregator.pid

      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to start..."
          sleep 30
          
          # Check Customer Profile
          for i in {1..30}; do
            if curl -f http://localhost:5551/customer-profile/management/health > /dev/null 2>&1; then
              echo "✓ Customer Profile is ready"
              break
            fi
            echo "Waiting for Customer Profile... ($i/30)"
            sleep 2
          done
          
          # Check Credit Profile
          for i in {1..30}; do
            if curl -f http://localhost:5552/credit-profile/management/health > /dev/null 2>&1; then
              echo "✓ Credit Profile is ready"
              break
            fi
            echo "Waiting for Credit Profile... ($i/30)"
            sleep 2
          done
          
          # Check Data Aggregator
          for i in {1..30}; do
            if curl -f http://localhost:5555/data-aggregator/management/health > /dev/null 2>&1; then
              echo "✓ Data Aggregator is ready"
              break
            fi
            echo "Waiting for Data Aggregator... ($i/30)"
            sleep 2
          done

      - name: Run tests with suite - ${{ steps.suite.outputs.suite }}
        working-directory: ./surptech-banking-tester
        run: |
          echo "=========================================="
          echo "Executing: ${{ steps.suite.outputs.suite }} test suite"
          echo "=========================================="
          if [ "${{ steps.suite.outputs.suite }}" == "all" ]; then
            mvn clean test -B
          else
            mvn clean test -P ${{ steps.suite.outputs.suite }} -B
          fi

      - name: Generate Allure Report
        if: always()
        working-directory: ./surptech-banking-tester
        run: mvn allure:report -B

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.suite.outputs.suite }}
          path: |
            surptech-banking-tester/target/surefire-reports/
            surptech-banking-tester/target/allure-results/
            surptech-banking-tester/target/allure-report/
          retention-days: 30

      - name: Upload Service Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: service-logs
          path: |
            customer-profile.log
            credit-profile.log
            data-aggregator.log
          retention-days: 7

      - name: Publish Test Report
        if: always()
        continue-on-error: true
        uses: dorny/test-reporter@v1
        with:
          name: Test Results - ${{ steps.suite.outputs.suite }}
          path: surptech-banking-tester/target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Stop services
        if: always()
        run: |
          if [ -f customer-profile.pid ]; then
            kill $(cat customer-profile.pid) || true
          fi
          if [ -f credit-profile.pid ]; then
            kill $(cat credit-profile.pid) || true
          fi
          if [ -f data-aggregator.pid ]; then
            kill $(cat data-aggregator.pid) || true
          fi

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Suite:** ${{ steps.suite.outputs.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "**Java Version:** 25" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f surptech-banking-tester/target/surefire-reports/TEST-*.xml ]; then
            echo "Test reports generated successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test reports found" >> $GITHUB_STEP_SUMMARY
          fi
