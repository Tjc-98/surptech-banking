<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Info - SurpTech Banking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        h2 {
            color: #2c3e50;
            margin-top: 24px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #eee;
        }
        td:first-child {
            font-weight: bold;
            color: #555;
            width: 45%;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>SurpTech Banking</h1>
    <div class="card">
        <h2>Customer Profile</h2>
        <table>
            <tr>
                <td>Social Security Number</td>
                <td th:text="${customer.socialSecurityNumber}"></td>
            </tr>
            <tr>
                <td>First Name</td>
                <td th:text="${customer.firstName}"></td>
            </tr>
            <tr>
                <td>Last Name</td>
                <td th:text="${customer.lastName}"></td>
            </tr>
            <tr>
                <td>Address</td>
                <td th:text="${customer.address}"></td>
            </tr>
        </table>

        <h2>Credit Profile</h2>
        <table>
            <tr>
                <td>Full Credit Balance</td>
                <td th:text="'$' + ${#numbers.formatDecimal(customer.fullCreditBalance, 1, 2)}"></td>
            </tr>
            <tr>
                <td>Spend Balance</td>
                <td th:text="'$' + ${#numbers.formatDecimal(customer.spendBalance, 1, 2)}"></td>
            </tr>
            <tr>
                <td>Interest Rate</td>
                <td th:text="${customer.interestRate} + '%'"></td>
            </tr>
        </table>

        <a class="back-link" href="/">&larr; Search again</a>
    </div>
</body>
</html>
