<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SurpTech Banking</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 14px;
            padding: 10px 24px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1a252f;
        }
        .error {
            margin-top: 16px;
            color: #c0392b;
            background: #fdecea;
            padding: 10px 14px;
            border-radius: 4px;
        }
        .hint {
            margin-top: 12px;
            font-size: 13px;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>SurpTech Banking</h1>
    <div class="card">
        <form action="/search" method="get">
            <label for="ssn">Social Security Number</label>
            <input type="text" id="ssn" name="socialSecurityNumber"
                   placeholder="e.g. 123-45-6789" maxlength="11" />
            <button type="submit">Look Up</button>
        </form>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <p class="hint">
            Try: <code>123-45-6789</code> or <code>987-65-4321</code>
        </p>
    </div>
</body>
</html>
